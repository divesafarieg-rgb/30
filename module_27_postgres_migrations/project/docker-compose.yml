networks:
  app-network:
    driver: bridge

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped
    networks:
      - app-network
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql
    ports:
      - "5432:5432"
    command: >
      postgres 
      -c log_destination=stderr 
      -c logging_collector=on 
      -c log_directory=/var/log/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: flask_app
    restart: unless-stopped
    networks:
      - app-network
    environment:
      DB_HOST: db
      DB_NAME: app_db
      DB_USER: user
      DB_PASSWORD: password
    volumes:
      - ./app:/app
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  postgres_logs: