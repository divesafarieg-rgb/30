[mypy]
python_version = 3.11
ignore_missing_imports = True
follow_imports = skip
warn_unused_ignores = False
warn_redundant_casts = False
disallow_untyped_defs = False
ignore_errors = True

[mypy-flask.*]
ignore_missing_imports = True

[mypy-flask_sqlalchemy.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True